<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FoundryStudio</title>
    <base href="/" />
    <link rel="stylesheet" href="tokens.css" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="serve.css" />
    <script>
        // No-flash theme: apply any persisted explicit theme to <html> before first paint.
        (function () {
            try {
                var v = localStorage.getItem("fs-theme");
                if (v === "light" || v === "dark") {
                    document.documentElement.setAttribute("data-theme", v);
                }
            } catch (e) { /* storage unavailable -> follow system */ }
        })();
    </script>
</head>
<body>
    <div id="app">Loading…</div>
    <script src="dialog.js"></script>
    <script src="chat.js"></script>
    <script src="theme.js"></script>
    <script src="_framework/blazor.webview.js" autostart="false"></script>
</body>
</html>
