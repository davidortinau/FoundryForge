<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Warm light tile so the copper flame is the hero (matches the app's light canvas). -->
    <linearGradient id="tile" x1="512" y1="100" x2="512" y2="924" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFDFA"/>
      <stop offset="1" stop-color="#F1E8DC"/>
    </linearGradient>
    <!-- Copper flame body: deep -> copper -> warm highlight (mirrors the original dark->light sweep). -->
    <linearGradient id="flameBody" x1="14" y1="48" x2="28" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5A2410"/>
      <stop offset="0.28" stop-color="#8F3510"/>
      <stop offset="0.6" stop-color="#B94A18"/>
      <stop offset="0.86" stop-color="#E8732B"/>
      <stop offset="1" stop-color="#FFC78F"/>
    </linearGradient>
    <linearGradient id="flameVert" x1="33.8" y1="30" x2="33.8" y2="2.3" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4A1E0C"/>
      <stop offset="0.5" stop-color="#B94A18"/>
      <stop offset="1" stop-color="#FF9E4A"/>
    </linearGradient>
    <linearGradient id="flameCurve" x1="39.6" y1="32" x2="39.6" y2="13.6" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7A2E0E"/>
      <stop offset="0.5" stop-color="#B94A18"/>
      <stop offset="1" stop-color="#FFB877"/>
    </linearGradient>
  </defs>

  <!-- Native macOS rounded tile (transparent corners; macOS does not auto-mask). -->
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#tile)"/>
  <rect x="100.5" y="100.5" width="823" height="823" rx="184.5" fill="none" stroke="#D8C9B6" stroke-opacity="0.6" stroke-width="1"/>

